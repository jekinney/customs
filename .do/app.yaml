# DigitalOcean App Platform spec for 120 Customs.
# App Platform builds the Dockerfile from the connected GitHub repo and deploys it.
# Deploys are gated by CI (deploy_on_push: false) — GitHub Actions triggers a deployment
# only after tests pass (see .github/workflows/ci.yml).
#
# First-time setup:  doctl apps create --spec .do/app.yaml
# Update spec:       doctl apps update <APP_ID> --spec .do/app.yaml
name: 120customs
region: nyc

services:
  - name: web
    # Build from our multi-stage Dockerfile (Next.js standalone output).
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: jekinney/customs
      branch: main
      deploy_on_push: false # CI triggers deploys after tests pass
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /
    envs:
      # Existing DO Managed Postgres — set as a SECRET (use the PRIVATE/VPC connection
      # string, .l.db.ondigitalocean.com, with ?sslmode=require). Add this App as a
      # Trusted Source on the database. Format:
      #   postgresql://doadmin:<password>@<private-host>:25060/defaultdb?sslmode=require
      - key: DATABASE_URI
        scope: RUN_TIME
        type: SECRET
      # Managed PG requires TLS; tells our config to enable ssl.
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: 'true'
      # FIRST DEPLOY ONLY: set to 'true' so Payload creates the schema on an empty DB,
      # then remove it (production must not auto-push on every deploy).
      - key: PAYLOAD_DB_PUSH
        scope: RUN_TIME
        value: 'false'
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_TIME
        value: https://120customs.com
      # Set these as encrypted app-level secrets (dashboard or `doctl apps update`):
      - key: PAYLOAD_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      # Resend (contact-form email). Verify a sending domain to use website@120customs.com.
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_FROM
        scope: RUN_TIME
        value: 120 Customs <onboarding@resend.dev>
      - key: INQUIRY_NOTIFY_EMAIL
        scope: RUN_TIME
        value: jason.kinney@120customs.com
      # DigitalOcean Spaces (media storage). Non-secret values below; keys are SECRET
      # (set them in the App Platform dashboard / `doctl apps update`).
      - key: S3_ENDPOINT
        scope: RUN_TIME
        value: https://sfo2.digitaloceanspaces.com
      - key: S3_REGION
        scope: RUN_TIME
        value: sfo2
      - key: S3_BUCKET
        scope: RUN_TIME
        value: 120customs-media
      - key: S3_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: S3_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET

# Using the existing DO Managed Postgres (set via the DATABASE_URI secret above),
# so no spec-created `databases:` block. Add this App as a Trusted Source on that
# database (DigitalOcean → Databases → Settings → Trusted Sources).
