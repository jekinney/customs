# Local development stack — `docker compose up` → http://localhost:3000
# The `app` service mounts the source for hot reload; `postgres` is the local DB.
# In this network the app reaches the DB at host `postgres` (see DATABASE_URI in .env).
services:
  app:
    image: node:22.17.0-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: customs
      POSTGRES_PASSWORD: customs
      POSTGRES_DB: customs
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U customs -d customs']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  pgdata:
